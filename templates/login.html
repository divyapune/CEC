<!-- templates/login.html -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(to right, #7ee8fa, #80bfff);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .card {
        width: 380px;
        background: #f2f2f2;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
      }

      .input-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        font-weight: 500;
      }

      .required {
        color: red;
      }

      input {
        width: 100%;
        padding: 12px;
        border-radius: 6px;
        border: 1px solid #ccc;
        box-sizing: border-box;
        font-size: 14px;
      }

      .password-container {
        position: relative;
      }

      .password-container input {
        padding-right: 40px;
      }

      .toggle-eye {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
      }

      .error {
        color: red;
        font-size: 12px;
        margin-top: 5px;
      }

      .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      .btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 15px;
      }

      .login-btn {
        background: #4caf50;
        color: white;
      }

      .reset-btn {
        background: #f44336;
        color: white;
      }

      .login-btn:hover {
        background: #388e3c;
      }

      .reset-btn:hover {
        background: #d32f2f;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Login</h2>

      <form
        id="loginForm"
        action="/login"
        method="POST"
        onsubmit="return validateForm();"
      >
        <div class="input-group">
          <label>Name <span class="required">*</span></label>
          <input type="text" id="name" name="name" />
          <div class="error" id="nameError"></div>
        </div>

        <div class="input-group">
          <label>Email <span class="required">*</span></label>
          <input type="email" id="email" name="email" />
          <div class="error" id="emailError"></div>
        </div>

        <div class="input-group">
          <label>Phone Number <span class="required">*</span></label>
          <input type="text" id="phone" name="phone" />
          <div class="error" id="phoneError"></div>
        </div>

        <div class="input-group">
          <label>Password <span class="required">*</span></label>

          <div class="password-container">
            <input type="password" id="password" name="password" />
            <i
              class="fa-solid fa-eye toggle-eye"
              onclick="togglePassword()"
            ></i>
          </div>

          <div class="error" id="passwordError"></div>
        </div>

        <div class="btn-group">
          <button type="submit" class="btn login-btn">Login</button>
          <button type="button" class="btn reset-btn" onclick="resetForm()">
            Reset
          </button>
        </div>
      </form>
    </div>

    <script>
      function togglePassword() {
        let password = document.getElementById("password");
        let icon = document.querySelector(".toggle-eye");

        if (password.type === "password") {
          password.type = "text";
          icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          password.type = "password";
          icon.classList.replace("fa-eye-slash", "fa-eye");
        }
      }

      function resetForm() {
        document.getElementById("loginForm").reset();
        document
          .querySelectorAll(".error")
          .forEach((error) => (error.innerText = ""));
      }

      function validateForm() {
        let valid = true;

        document
          .querySelectorAll(".error")
          .forEach((error) => (error.innerText = ""));

        let name = document.getElementById("name").value.trim();
        let email = document.getElementById("email").value.trim();
        let phone = document.getElementById("phone").value.trim();
        let password = document.getElementById("password").value.trim();

        if (name === "") {
          document.getElementById("nameError").innerText = "Name is required";
          valid = false;
        }

        let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
        if (!email.match(emailPattern)) {
          document.getElementById("emailError").innerText =
            "Enter a valid email";
          valid = false;
        }

        let phonePattern = /^[0-9]{10}$/;
        if (!phone.match(phonePattern)) {
          document.getElementById("phoneError").innerText =
            "Phone number must be 10 digits";
          valid = false;
        }

        let passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).+$/;
        if (!password.match(passwordPattern)) {
          document.getElementById("passwordError").innerText =
            "Password must contain uppercase, lowercase and number";
          valid = false;
        }

        return valid;
      }
    </script>
  </body>
</html>
